<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팜젠사이언스 거래처 조회 [CSO용]</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(16,185,129,0.04) 0%, transparent 50%);
  }
  .container { width:100%; max-width:480px; }

  .header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.5s ease; }
  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 15px rgba(59,130,246,0.3);
  }
  .logo-text { font-size: 12px; font-weight: 700; color: var(--accent2); letter-spacing: 0.15em; text-transform: uppercase; }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header p  { font-size: 12px; color: var(--text3); }

  .search-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease 0.1s both;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .search-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; display: block; }
  .search-row { display: flex; gap: 10px; }
  .search-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .search-btn {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    border: none; border-radius: 10px; padding: 13px 22px;
    color: white; font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(59,130,246,0.3);
  }
  .search-btn:hover { transform: translateY(-1px); }
  .search-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .search-hint { margin-top: 8px; font-size: 12px; color: var(--text3); }

  .loading { display: none; text-align: center; padding: 28px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  .loading p { font-size: 13px; color: var(--text3); }

  /* 결과 - 심플 버전 */
  .result-card {
    display: none;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .result-top {
    padding: 22px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-name { font-size: 18px; font-weight: 700; }
  .result-type { font-size: 12px; color: var(--text3); margin-top: 3px; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 8px 16px; border-radius: 20px;
    font-size: 14px; font-weight: 700; white-space: nowrap;
  }
  .badge-green { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .badge-red   { background: rgba(239,68,68,0.15);  color: var(--red);   border: 1px solid rgba(239,68,68,0.3); }
  .badge-yellow{ background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }

  /* 큰 판정 영역 */
  .verdict-big {
    padding: 32px 24px;
    text-align: center;
  }

  .verdict-icon { font-size: 52px; margin-bottom: 14px; }

  .verdict-main {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .verdict-main.available { color: var(--green); }
  .verdict-main.blocked   { color: var(--red); }
  .verdict-main.blocked-retail { color: var(--yellow); }

  .verdict-sub {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
  }

  /* 사업자번호만 표시 */
  .biz-chip {
    display: inline-block;
    margin-top: 16px;
    background: var(--bg3);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text3);
  }

  .not-found { display: none; background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 40px 24px; text-align: center; animation: fadeUp 0.4s ease; }
  .not-found-icon { font-size: 40px; margin-bottom: 12px; }
  .not-found h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .not-found p  { font-size: 13px; color: var(--text3); line-height: 1.6; }

  .update-time { text-align: center; font-size: 11px; color: var(--text3); margin-top: 10px; }
  .error-box { display: none; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 14px 18px; font-size: 13px; color: var(--red); }

  .history { margin-top: 16px; }
  .history-title { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .history-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .history-chip:hover { border-color: var(--accent); color: var(--accent2); }

  @keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin     { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">💊</div>
      <span class="logo-text">Pharmgen Science</span>
    </div>
    <h1>거래처 이관 가능 여부 조회</h1>
    <p>사업자번호를 입력하면 이관 가능 여부를 확인합니다</p>
  </div>

  <div class="search-box">
    <span class="search-label">사업자번호 조회</span>
    <div class="search-row">
      <input type="text" class="search-input" id="bizInput" placeholder="000-00-00000" maxlength="12" autocomplete="off" />
      <button class="search-btn" id="searchBtn" onclick="search()">조회</button>
    </div>
    <div class="search-hint">하이픈(-) 포함 또는 미포함 모두 입력 가능합니다</div>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><p>조회 중...</p></div>
  <div class="error-box" id="errorBox"></div>

  <!-- 결과 카드 (심플) -->
  <div class="result-card" id="resultCard">
    <div class="result-top">
      <div>
        <div class="result-name" id="resultName"></div>
        <div class="result-type" id="resultType"></div>
      </div>
      <div class="badge" id="resultBadge"></div>
    </div>
    <div class="verdict-big">
      <div class="verdict-icon" id="verdictIcon"></div>
      <div class="verdict-main" id="verdictMain"></div>
      <div class="verdict-sub"  id="verdictSub"></div>
      <div class="biz-chip"     id="bizChip"></div>
    </div>
  </div>

  <div class="not-found" id="notFound">
    <div class="not-found-icon">✅</div>
    <h3>신규 거래 가능한 거래처입니다</h3>
    <p>등록되지 않은 거래처로 신규 거래가 가능합니다.</p>
    <div style="margin-top:16px; background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.3); border-radius:10px; padding:14px 16px; text-align:left;">
      <div style="font-size:12px; font-weight:600; color:#10b981; margin-bottom:8px;">📋 거래처 등록 요청 시 필수자료</div>
      <div style="font-size:13px; color:#94a3b8; line-height:1.8;">
        · 사업자등록증<br>
        · 해당 실적자료
      </div>
      <div style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(16,185,129,0.2); font-size:13px; color:#94a3b8;">
        거래처 등록 요청 → <strong style="color:#e2e8f0;">SS-Compare</strong>
      </div>
    </div>
  </div>

  <div class="update-time" id="updateTime"></div>

  <div class="history" id="historyArea" style="display:none;">
    <div class="history-title">최근 조회</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwcKvQDFyb0LQteHCcCpeQPaSiOO7JsZrT6WIwFsegSo-eWQKRt8brxmAeWwSG_kL5O/exec';
  let history = JSON.parse(localStorage.getItem('biz_history_cso') || '[]');

  document.getElementById('bizInput').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
  document.getElementById('bizInput').addEventListener('input', e => {
    let v = e.target.value.replace(/[^0-9]/g, '');
    if (v.length > 3 && v.length <= 5)  v = v.slice(0,3) + '-' + v.slice(3);
    else if (v.length > 5)              v = v.slice(0,3) + '-' + v.slice(3,5) + '-' + v.slice(5,10);
    e.target.value = v;
  });

  async function search() {
    const input = document.getElementById('bizInput').value.trim();
    if (!input) { showError('사업자번호를 입력해주세요.'); return; }
    hideAll();
    show('loading');
    document.getElementById('searchBtn').disabled = true;
    try {
      const res  = await fetch(`${API_URL}?biz_no=${encodeURIComponent(input)}`);
      const data = await res.json();
      hide('loading');
      document.getElementById('searchBtn').disabled = false;
      if (data.found) { renderResult(data.data); addHistory(input); }
      else show('notFound');
    } catch {
      hide('loading');
      document.getElementById('searchBtn').disabled = false;
      showError('조회 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    }
  }

  function renderResult(d) {
    // 거래처명, 종류만 표시
    document.getElementById('resultName').textContent = d['거래처명'] || '-';
    document.getElementById('resultType').textContent = d['거래처종류'] || '';
    document.getElementById('bizChip').textContent    = d['사업자번호'] || '';

    const verdict = d['최종판정'] || '';
    const badge   = document.getElementById('resultBadge');

    if (verdict === '이관가능') {
      badge.className = 'badge badge-green';
      badge.textContent = '✅ 이관가능';
      document.getElementById('verdictIcon').textContent = '✅';
      document.getElementById('verdictMain').className   = 'verdict-main available';
      document.getElementById('verdictMain').textContent = '이관 가능합니다';
      document.getElementById('verdictSub').innerHTML    = '해당 거래처는 현재 팜젠사이언스와<br>거래 이력이 없어 이관이 가능합니다.<br><br>📋 <strong style="color:#e2e8f0;">거래처 등록 요청 시 필수자료</strong><br>· 사업자등록증&nbsp;&nbsp;· 해당 실적자료<br><br>거래처 등록 요청 → <strong style="color:#e2e8f0;">SS-Compare</strong>';
    } else if (verdict.includes('소매 내부거래중')) {
      badge.className = 'badge badge-yellow';
      badge.textContent = '⚠️ 거래불가';
      document.getElementById('verdictIcon').textContent = '⚠️';
      document.getElementById('verdictMain').className   = 'verdict-main blocked-retail';
      document.getElementById('verdictMain').textContent = '이관이 불가합니다';
      document.getElementById('verdictSub').textContent  = '해당 거래처는 현재 팜젠사이언스 내부에서\n거래가 진행 중입니다.';
    } else {
      badge.className = 'badge badge-red';
      badge.textContent = '🚫 거래불가';
      document.getElementById('verdictIcon').textContent = '🚫';
      document.getElementById('verdictMain').className   = 'verdict-main blocked';
      document.getElementById('verdictMain').textContent = '이관이 불가합니다';
      document.getElementById('verdictSub').textContent  = '해당 거래처는 현재 다른 CSO와\n거래가 진행 중입니다.';
    }

    if (d['업데이트일시']) document.getElementById('updateTime').textContent = `데이터 기준: ${d['업데이트일시']}`;
    show('resultCard');
  }

  function addHistory(biz) {
    history = [biz, ...history.filter(h => h !== biz)].slice(0, 5);
    localStorage.setItem('biz_history_cso', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) return;
    document.getElementById('historyArea').style.display = 'block';
    document.getElementById('historyList').innerHTML = history.map(h =>
      `<span class="history-chip" onclick="searchBiz('${h}')">${h}</span>`
    ).join('');
  }

  function searchBiz(biz) { document.getElementById('bizInput').value = biz; search(); }
  function showError(msg) { hide('loading'); const b = document.getElementById('errorBox'); b.textContent = msg; b.style.display = 'block'; }
  function show(id) { document.getElementById(id).style.display = 'block'; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function hideAll() {
    ['loading','resultCard','notFound','errorBox'].forEach(hide);
    document.getElementById('updateTime').textContent = '';
  }

  renderHistory();
</script>
</body>
</html>
