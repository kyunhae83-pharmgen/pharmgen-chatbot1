<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팜젠사이언스 거래처 조회 [CSO용]</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --bg2: #ffffff;
    --bg3: #f4f7ff;
    --border: #dde5f4;
    --accent: #0077e6;
    --accent2: #005bbf;
    --accent3: #00aaff;
    --green: #0a9e6e;
    --green-bg: #edfaf4;
    --green-border: #b6e8d4;
    --red: #d93025;
    --red-bg: #fff0ee;
    --red-border: #f4c0bb;
    --yellow: #c67f00;
    --yellow-bg: #fff8e6;
    --yellow-border: #f5dfa0;
    --text: #0f1f3d;
    --text2: #3a4f70;
    --text3: #7a8fb0;
    --shadow: 0 2px 16px rgba(0,80,200,0.08);
    --shadow-lg: 0 8px 32px rgba(0,80,200,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(0,119,230,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 90%, rgba(0,170,255,0.05) 0%, transparent 50%);
  }
  .container { width:100%; max-width:500px; }

  .header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.5s ease; }
  .logo-wrap { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .logo-img { width: auto; height: 56px; object-fit: contain; filter: none; }
  .logo-text-wrap { text-align: left; }
  .logo-en { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase; }
  .logo-kr { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.04em; }
  .header-divider { width: 40px; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 2px; margin: 10px auto; }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .header p  { font-size: 12px; color: var(--text3); }

  .search-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.5s ease 0.1s both;
  }
  .search-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; display: block; }
  .search-row { display: flex; gap: 10px; }
  .search-input {
    flex: 1;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,119,230,0.12); }
  .search-btn {
    background: linear-gradient(135deg, #0077e6, #005bbf);
    border: none; border-radius: 10px; padding: 12px 22px;
    color: white; font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(0,119,230,0.25);
  }
  .search-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,119,230,0.35); }
  .search-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .search-hint { margin-top: 8px; font-size: 12px; color: var(--text3); }

  .loading { display: none; text-align: center; padding: 28px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  .loading p { font-size: 13px; color: var(--text3); }

  .result-card {
    display: none;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease;
    box-shadow: var(--shadow-lg);
  }
  .result-top {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(135deg, #f4f8ff, #ffffff);
  }
  .result-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .result-type { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .badge-green  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
  .badge-red    { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-border); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }

  .verdict-big { padding: 28px 24px; text-align: center; }
  .verdict-icon { font-size: 48px; margin-bottom: 12px; }
  .verdict-main { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
  .verdict-main.available { color: var(--green); }
  .verdict-main.blocked   { color: var(--red); }
  .verdict-main.blocked-retail { color: var(--yellow); }
  .verdict-sub { font-size: 13px; color: var(--text2); line-height: 1.8; }

  .required-box {
    margin: 16px 24px 24px;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: left;
  }
  .required-box.hidden { display: none; }
  .required-title { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
  .required-list  { font-size: 13px; color: var(--text2); line-height: 1.9; }
  .required-divider { margin: 8px 0; border: none; border-top: 1px solid var(--green-border); }
  .required-system { font-size: 13px; color: var(--text2); }
  .required-system strong { color: var(--text); }

  .biz-chip {
    display: inline-block; margin-top: 12px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text3);
  }

  .not-found {
    display: none; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    animation: fadeUp 0.4s ease; box-shadow: var(--shadow-lg);
  }
  .not-found-top {
    padding: 28px 24px; text-align: center;
    background: linear-gradient(135deg, #f4f8ff, #ffffff);
    border-bottom: 1px solid var(--border);
  }
  .not-found-icon { font-size: 44px; margin-bottom: 12px; }
  .not-found h3 { font-size: 17px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
  .not-found p  { font-size: 13px; color: var(--text2); line-height: 1.6; }

  .update-time { text-align: center; font-size: 11px; color: var(--text3); margin-top: 10px; }
  .error-box {
    display: none; background: var(--red-bg); border: 1px solid var(--red-border);
    border-radius: 12px; padding: 14px 18px; font-size: 13px; color: var(--red);
  }

  .history { margin-top: 16px; }
  .history-title { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .history-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-chip {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text2); cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .history-chip:hover { border-color: var(--accent); color: var(--accent); }

  @keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @media (max-width: 480px) { .search-btn { padding: 12px 14px; font-size: 13px; } }
</style>
</head>

      <div class="logo-text-wrap" style="display:none;">
        <div class="logo-en">Pharmgen Science</div>
        <div class="logo-kr">팜젠사이언스</div>
      </div>
    </div>
    <div class="header-divider"></div>
    <h1>거래처 이관 가능 여부 조회</h1>
    <p>사업자번호를 입력하면 이관 가능 여부를 즉시 확인합니다</p>
  </div>

  <div class="search-box">
    <span class="search-label">사업자번호 조회</span>
    <div class="search-row">
      <input type="text" class="search-input" id="bizInput" placeholder="000-00-00000" maxlength="12" autocomplete="off" />
      <button class="search-btn" id="searchBtn" onclick="search()">조회</button>
    </div>
    <div class="search-hint">하이픈(-) 포함 또는 미포함 모두 입력 가능합니다</div>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><p>조회 중...</p></div>
  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <div class="result-top">
      <div>
        <div class="result-name" id="resultName"></div>
        <div class="result-type" id="resultType"></div>
      </div>
      <div class="badge" id="resultBadge"></div>
    </div>
    <div class="verdict-big">
      <div class="verdict-icon" id="verdictIcon"></div>
      <div class="verdict-main" id="verdictMain"></div>
      <div class="verdict-sub"  id="verdictSub"></div>
      <div class="biz-chip"     id="bizChip"></div>
    </div>
    <div class="required-box hidden" id="requiredBox">
      <div class="required-title">📋 거래처 등록 요청 시 필수자료</div>
      <div class="required-list">· 사업자등록증<br>· 해당 실적자료</div>
      <hr class="required-divider">
      <div class="required-system">거래처 등록 요청 → <strong>SS-Compare</strong></div>
    </div>
  </div>

  <div class="not-found" id="notFound">
    <div class="not-found-top">
      <div class="not-found-icon">✅</div>
      <h3>신규 거래 가능한 거래처입니다</h3>
      <p>등록되지 않은 거래처로 신규 거래가 가능합니다.</p>
    </div>
    <div class="required-box" style="margin:16px;">
      <div class="required-title">📋 거래처 등록 요청 시 필수자료</div>
      <div class="required-list">· 사업자등록증<br>· 해당 실적자료</div>
      <hr class="required-divider">
      <div class="required-system">거래처 등록 요청 → <strong>SS-Compare</strong></div>
    </div>
  </div>

  <div class="update-time" id="updateTime"></div>

  <div class="history" id="historyArea" style="display:none;">
    <div class="history-title">최근 조회</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwcKvQDFyb0LQteHCcCpeQPaSiOO7JsZrT6WIwFsegSo-eWQKRt8brxmAeWwSG_kL5O/exec';
  let history = JSON.parse(localStorage.getItem('biz_history_cso') || '[]');

  document.getElementById('bizInput').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
  document.getElementById('bizInput').addEventListener('input', e => {
    let v = e.target.value.replace(/[^0-9]/g, '');
    if (v.length > 3 && v.length <= 5)  v = v.slice(0,3) + '-' + v.slice(3);
    else if (v.length > 5)              v = v.slice(0,3) + '-' + v.slice(3,5) + '-' + v.slice(5,10);
    e.target.value = v;
  });

  async function search() {
    const input = document.getElementById('bizInput').value.trim();
    if (!input) { showError('사업자번호를 입력해주세요.'); return; }
    hideAll(); show('loading');
    document.getElementById('searchBtn').disabled = true;
    try {
      const res  = await fetch(API_URL + '?biz_no=' + encodeURIComponent(input));
      const data = await res.json();
      hide('loading');
      document.getElementById('searchBtn').disabled = false;
      if (data.found) { renderResult(data.data); addHistory(input); }
      else show('notFound');
    } catch {
      hide('loading');
      document.getElementById('searchBtn').disabled = false;
      showError('조회 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    }
  }

  function renderResult(d) {
    document.getElementById('resultName').textContent = d['거래처명'] || '-';
    document.getElementById('resultType').textContent = d['거래처종류'] || '';
    document.getElementById('bizChip').textContent    = d['사업자번호'] || '';

    const verdict = d['최종판정'] || '';
    const badge   = document.getElementById('resultBadge');
    const reqBox  = document.getElementById('requiredBox');

    reqBox.classList.add('hidden');

    if (verdict === '이관가능') {
      badge.className = 'badge badge-green'; badge.textContent = '✅ 이관가능';
      document.getElementById('verdictIcon').textContent = '✅';
      document.getElementById('verdictMain').className   = 'verdict-main available';
      document.getElementById('verdictMain').textContent = '이관 가능합니다';
      document.getElementById('verdictSub').textContent  = '해당 거래처는 현재 팜젠사이언스와\n거래 이력이 없어 이관이 가능합니다.';
      reqBox.classList.remove('hidden');
    } else if (verdict.includes('소매 내부거래중')) {
      badge.className = 'badge badge-yellow'; badge.textContent = '⚠️ 거래불가';
      document.getElementById('verdictIcon').textContent = '⚠️';
      document.getElementById('verdictMain').className   = 'verdict-main blocked-retail';
      document.getElementById('verdictMain').textContent = '이관이 불가합니다';
      document.getElementById('verdictSub').textContent  = '해당 거래처는 현재 팜젠사이언스 내부에서\n거래가 진행 중입니다.';
    } else {
      badge.className = 'badge badge-red'; badge.textContent = '🚫 거래불가';
      document.getElementById('verdictIcon').textContent = '🚫';
      document.getElementById('verdictMain').className   = 'verdict-main blocked';
      document.getElementById('verdictMain').textContent = '이관이 불가합니다';
      document.getElementById('verdictSub').textContent  = '해당 거래처는 현재 다른 CSO와\n거래가 진행 중입니다.';
    }

    if (d['업데이트일시']) document.getElementById('updateTime').textContent = '데이터 기준: ' + d['업데이트일시'];
    show('resultCard');
  }

  function addHistory(biz) {
    history = [biz, ...history.filter(h => h !== biz)].slice(0, 5);
    localStorage.setItem('biz_history_cso', JSON.stringify(history));
    renderHistory();
  }
  function renderHistory() {
    if (history.length === 0) return;
    document.getElementById('historyArea').style.display = 'block';
    document.getElementById('historyList').innerHTML = history.map(h =>
      '<span class="history-chip" onclick="searchBiz(\'' + h + '\')">' + h + '</span>'
    ).join('');
  }
  function searchBiz(biz) { document.getElementById('bizInput').value = biz; search(); }
  function showError(msg) { hide('loading'); const b = document.getElementById('errorBox'); b.textContent = msg; b.style.display = 'block'; }
  function show(id) { document.getElementById(id).style.display = 'block'; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function hideAll() { ['loading','resultCard','notFound','errorBox'].forEach(hide); document.getElementById('updateTime').textContent = ''; }
  renderHistory();
</script>
</body>
</html>
